name: Next Sequence

on:
  workflow_run:
    workflows: ["Merge Gate"]
    types: [completed]

permissions:
  contents: read
  issues: write

jobs:
  trigger_next:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0].number != null
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Resolve merge status and log continuity
        id: continuity
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.workflow_run.pull_requests[0].number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const merged = Boolean(pr.merged);
            const msg = merged
              ? `✅ Next sequence unlocked after PR #${prNumber} merge (${pr.merge_commit_sha}).`
              : `ℹ️ Merge Gate succeeded but PR #${prNumber} is not merged yet.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: [
                "**Next Sequence Continuity Snapshot**",
                "",
                `- Entry: workflow_run success from Merge Gate`,
                `- Decision: ${merged ? "next sequence enabled" : "awaiting merge completion"}`,
                `- Evidence: merged=${merged}, merge_commit_sha=${pr.merge_commit_sha || "n/a"}`,
                `- Next trigger: ${merged ? "repository dispatch: pipeline-next-sequence" : "merge event"}`
              ].join("\n")
            });

            core.setOutput("merged", String(merged));
            core.setOutput("pr_number", String(prNumber));
            core.setOutput("merge_sha", pr.merge_commit_sha || "");

      - name: Dispatch next sequence event
        if: steps.continuity.outputs.merged == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: "pipeline-next-sequence",
              client_payload: {
                pr_number: Number("${{ steps.continuity.outputs.pr_number }}"),
                merge_sha: "${{ steps.continuity.outputs.merge_sha }}"
              }
            });
