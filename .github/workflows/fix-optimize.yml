name: Fix and Optimize

on:
  workflow_run:
    workflows: ["Validate Researcher Operating System"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write

jobs:
  fix_optimize:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0].number != null
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout PR HEAD
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: pip install -r requirements-dev.txt

      - name: Optimization sanity check
        run: python -m unittest researcher.scripts.tests.test_skill_frontmatter

      - name: Publish stage result to PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.workflow_run.pull_requests[0];
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: [
                "✅ **Fix and Optimize stage completed**",
                "",
                "- Validation predecessor: success",
                "- Optimization pass: sanity checks executed",
                "- Next trigger: `Merge Gate` via `workflow_run`"
              ].join("\n")
            });

      - name: Persist continuity snapshot
        if: always()
        run: |
          mkdir -p .github/continuity
          cat > .github/continuity/fix-optimize-snapshot.json <<'JSON'
          {
            "stage": "fix-optimize",
            "entry": "workflow_run success from validate",
            "decision": "optimization pass completed with sanity check",
            "evidence": "frontmatter parser unit tests passed",
            "next_trigger": "workflow_run: Merge Gate"
          }
          JSON

      - name: Upload continuity snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: continuity-fix-optimize-${{ github.run_id }}
          path: .github/continuity/fix-optimize-snapshot.json
